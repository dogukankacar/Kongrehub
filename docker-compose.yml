version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kongre-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kongre-net

  redis:
    image: redis:7-alpine
    container_name: kongre-redis
    ports:
      - "6379:6379"
    networks:
      - kongre-net

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: kongre-auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpiryMinutes=${JWT_EXPIRY_MINUTES}
    ports:
      - "5001:8080"
    depends_on:
      - postgres
    networks:
      - kongre-net

  congress-service:
    build:
      context: ./services/congress-service
      dockerfile: Dockerfile
    container_name: kongre-congress
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    ports:
      - "5002:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - kongre-net

  scraper-service:
    build:
      context: ./services/scraper-service
      dockerfile: Dockerfile
    container_name: kongre-scraper
    environment:
      - NODE_ENV=production
      - CONGRESS_SERVICE_URL=http://congress-service:8080
      - REDIS_URL=redis://redis:6379
      - CRON_SCHEDULE=0 2 * * *
    ports:
      - "5003:3000"
    depends_on:
      - redis
      - congress-service
    networks:
      - kongre-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kongre-frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - congress-service
    networks:
      - kongre-net

volumes:
  postgres_data:

networks:
  kongre-net:
    driver: bridge
